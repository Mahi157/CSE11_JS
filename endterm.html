<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    width: 400px;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
}

h2{
    text-align: center;
    margin-bottom: 20px;
}

input{
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 15px;
}

button{
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background-color: #0056b3;
}

.result{
    margin-top: 20px;
    padding: 10px;
    background-color: #eef;
    border-radius: 5px;
}
    </style>
</head>
<body>

    <div class="container">
        <h2>Student Result Calculator</h2>

        <input type="number" id="sub1" placeholder="Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Subject 3 Marks">
        <input type="number" id="sub4" placeholder="Subject 4 Marks">

        <button onclick="calculateResult()">Calculate</button>

        <div class="result" id="output"></div>
    </div>

    <script>
        function calculateResult() {

let marks = [];
let total = 0;

for (let i = 1; i <= 4; i++) {

    let mark = Number(document.getElementById("sub" + i).value);

    if (isNaN(mark) || mark < 0 || mark > 100) {
        document.getElementById("output").innerHTML =
            "<p>Please enter valid marks (0-100).</p>";
        return;
    }

    marks.push(mark);
    total += mark;
}

let average = total / 4;

let grade;

if (average >= 90) {
    grade = "A+";
}
else if (average >= 80) {
    grade = "A";
}
else if (average >= 70) {
    grade = "B";
}
else if (average >= 60) {
    grade = "C";
}
else if (average >= 50) {
    grade = "D";
}
else {
    grade = "F";
}

let result = "PASS";

for (let i = 0; i < marks.length; i++) {
    if (marks[i] < 35) {
        result = "FAIL";
        break;
    }
}

document.getElementById("output").innerHTML = `
    <p>Result</p>
    <p><b>Total Marks:</b> ${total}</p>
    <p><b>Average:</b> ${average.toFixed(2)}</p>
    <p><b>Grade:</b> ${grade}</p>
    <p><b>Result:</b> ${result}</p>
`;
}
    </script>

</body>
</html>
